<div
  class="lang-segment"
  role="radiogroup"
  [attr.aria-label]="'nav.language' | translate">
  @for (language of languages; track language) {
    <button
      type="button"
      class="lang-segment__btn"
      role="radio"
      [attr.aria-checked]="currentLang === language"
      [class.lang-segment__btn--active]="currentLang === language"
      [attr.title]="language === 'es' ? ('nav.lang-es' | translate) : ('nav.lang-en' | translate)"
      (click)="useLanguage(language)">
      {{ language | uppercase }}
    </button>
  }
</div>
