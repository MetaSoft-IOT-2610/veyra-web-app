<div class="success-page">
  <div class="success-card">
    <div class="icon-container">
      <div class="check-icon">
        <i class="fa-solid fa-check"></i>
      </div>
    </div>

    <h1 class="title">Payment Successful!</h1>
    <p class="message">
      Thank you for choosing <strong>Veyra</strong>. Your subscription has been activated successfully.
      You can now log in to your account and start managing your care services.
    </p>

    <div class="action-section">
      <button class="login-btn" (click)="goToLogin()">
        Go to Login
      </button>
      <p class="support-text">
        Having trouble? <a href="#">Contact Support</a>
      </p>
    </div>
  </div>
</div>
