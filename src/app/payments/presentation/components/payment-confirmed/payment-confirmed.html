<div class="success-page">
  <mat-card class="success-card">
    <mat-card-content>
      <div class="icon-container">
        <mat-icon class="check-icon" color="primary">check_circle</mat-icon>
      </div>

      <h1 class="title">{{ 'payments.success.title' | translate }}</h1>
      <p class="message" [innerHTML]="'payments.success.message' | translate"></p>

      <div class="action-section">
        <button mat-flat-button color="primary" class="login-btn" (click)="goToLogin()">
          {{ 'payments.success.go-login' | translate }}
        </button>
        <p class="support-text">
          {{ 'payments.success.trouble' | translate }} <a mat-button color="accent">{{ 'payments.success.support' | translate }}</a>
        </p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
