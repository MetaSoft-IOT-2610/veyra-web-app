<div class="success-page">
  <div class="success-card">
    <div class="icon-container">
      <div class="check-icon">
        <i class="fa-solid fa-check"></i>
      </div>
    </div>

    <h1 class="title">{{ 'payments.success.title' | translate }}</h1>

    <p class="message" [innerHTML]="'payments.success.message' | translate"></p>

    <div class="action-section">
      <button class="login-btn" (click)="goToLogin()">
        {{ 'payments.success.go-login' | translate }}
      </button>
      <p class="support-text">
        {{ 'payments.success.trouble' | translate }} <a href="#">{{ 'payments.success.support' | translate }}</a>
      </p>
    </div>
  </div>
</div>
