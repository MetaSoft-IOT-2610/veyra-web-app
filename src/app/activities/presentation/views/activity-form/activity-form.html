<div class="activity-form-container">
  <mat-card>
    <mat-card-title>New Activity</mat-card-title>
    <mat-card-content>

      @if (error) {
        <div class="error-message">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput [(ngModel)]="title" name="title" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Activity Type</mat-label>
          <mat-select [(ngModel)]="type" name="type" required>
            @for (activityType of activityTypes; track activityType) {
              <mat-option [value]="activityType">{{ activityType }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <div class="recurring-row">
          <mat-checkbox [(ngModel)]="isRecurring" name="isRecurring">
            Recurring activity
          </mat-checkbox>
        </div>

        @if (isRecurring) {
          <div class="days-row">
            @for (day of weekDays; track day) {
              <button
                mat-icon-button
                type="button"
                [class.day-selected]="isDaySelected(day)"
                (click)="toggleDay(day)">
                {{ day.slice(0, 1) }}
              </button>
            }
          </div>
        }

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="loading">
            @if (loading) {
              <mat-icon>hourglass_empty</mat-icon>
            } @else {
              <mat-icon>save</mat-icon>
            }
            Save Activity
          </button>
        </div>
      </form>

    </mat-card-content>
  </mat-card>
</div>
