<app-layout-nursing-home>
  <div class="activity-form-container">
    <div class="header">
      <button mat-icon-button (click)="onCancel()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h2>Log New Activity</h2>
    </div>

    <mat-card>
      <mat-card-title>Activity Details</mat-card-title>
      <mat-card-content>

        @if (error) {
          <div class="error-message">
            <mat-icon>error_outline</mat-icon>
            <span>{{ error }}</span>
          </div>
        }

        <form (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Resident ID</mat-label>
            <input matInput type="number" [(ngModel)]="residentId" name="residentId" required />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Activity Type</mat-label>
            <mat-select [(ngModel)]="type" name="type" required>
              @for (activityType of activityTypes; track activityType) {
                <mat-option [value]="activityType">{{ activityType }}</mat-option>
              }
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Notes</mat-label>
            <textarea matInput [(ngModel)]="notes" name="notes" rows="4"></textarea>
          </mat-form-field>

          <div class="form-actions">
            <button mat-button type="button" (click)="onCancel()">
              Cancel
            </button>
            <button mat-raised-button color="primary" type="submit" [disabled]="loading">
              @if (loading) {
                <mat-icon>hourglass_empty</mat-icon>
              } @else {
                <mat-icon>save</mat-icon>
              }
              Log Activity
            </button>
          </div>
        </form>

      </mat-card-content>
    </mat-card>
  </div>
</app-layout-nursing-home>
